<div class="login-container">
  <div class="login-card">

    <div class="login-header">
      <h1>Bienvenido</h1>
      <p>Ingresa para comenzar tu experiencia</p>
    </div>

    <form (ngSubmit)="login()" #loginForm="ngForm" class="login-form">

      <div class="form-group">
        <label for="email">Correo Electronico</label>
        <input
        id="email"
        type="email"
        name="email"
        [(ngModel)]="email"
        placeholder="Escriba su correo"
        required
        email
        #emailInput="ngModel"
        class="form-input"
        />

        <div class="error-message" *ngIf="emailInput.invalid && emailInput.touched">
          Correo invalido
        </div>

      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          name="password"
          [(ngModel)]="password"
          placeholder="Ingrese su contraseña"
          required
          minlength="4"
          #passwordInput="ngModel"
          class="form-input"
        />

        <div class="error-message" *ngIf="passwordInput.invalid && passwordInput.touched">Mínimo 4 caracteres</div>

      </div>

      <div>
        {{ errorMessage }}
      </div>

      <button
      type="submit"
      class="login-btn"
      [disabled]="loginForm.invalid || isLoading"
      >
        {{ isLoading ? 'INGRESANDO...' : 'INGRESAR' }}
      </button>

    </form>

    <P class="forgot-password"> ¿Olvidaste tu contraseña? </P>


  </div>
</div>
